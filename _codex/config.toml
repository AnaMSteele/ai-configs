# Codex Configuration Template
# Reference only; the installer does not copy or merge this file.

model = "gpt-5.5"
model_reasoning_effort = "high"
approval_policy = "never"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = true

[tools]
web_search = true
view_image = true

# MCP Servers - see mcp-servers.toml for additional server definitions
[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest"]
